version: '3.8'

services:
  certmonitor:
    build: ./server
    container_name: certmonitor-server
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - certmonitor-net

  db:
    image: postgres:16-alpine
    container_name: certmonitor-db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-certmonitor}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - certmonitor-net

volumes:
  postgres_data:

networks:
  certmonitor-net:
    driver: bridge
