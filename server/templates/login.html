<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertMonitor — Login</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: #ffffff;
            --text-primary: #333333;
            --text-secondary: #888888;
            --label-color: #555555;
            --input-bg: #ffffff;
            --input-border: #e0e0e0;
            --error-bg: #fff0f0;
            --error-border: #ffcccc;
        }

        :root.dark {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: #1e2030;
            --text-primary: #e0e0e0;
            --text-secondary: #888888;
            --label-color: #aaaaaa;
            --input-bg: #252840;
            --input-border: #3a3f5c;
            --error-bg: #2e1a1a;
            --error-border: #5c2a2a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 50px 45px;
            width: 100%;
            max-width: 420px;
            transition: background 0.3s;
        }

        .logo { text-align: center; margin-bottom: 35px; }
        .logo h1 { font-size: 2em; color: var(--text-primary); }
        .logo p { color: var(--text-secondary); font-size: 0.9em; margin-top: 6px; }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.85em;
            font-weight: 600;
            color: var(--label-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 13px 15px;
            border: 2px solid var(--input-border);
            border-radius: 8px;
            font-size: 1em;
            background: var(--input-bg);
            color: var(--text-primary);
            transition: border-color 0.3s, background 0.3s;
            outline: none;
        }

        input:focus { border-color: #667eea; }

        .error {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            color: #e74c3c;
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            margin-bottom: 20px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            margin-top: 10px;
        }

        button[type="submit"]:hover { opacity: 0.92; transform: translateY(-1px); }
    </style>
    <script>
        const saved = localStorage.getItem('darkMode');
        if (saved === 'true' || (saved === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <h1>🔐 CertMonitor</h1>
            <p>Monitoramento de Certificados SSL/TLS</p>
        </div>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post" action="/login">
            <div class="form-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" name="username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
    </div>
</body>
</html>
